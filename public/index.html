<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভূমি লিজ ব্যবস্থাপনা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .dropdown-list {
            position: absolute;
            z-index: 50;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.375rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .dropdown-item {
            padding: 8px 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .dropdown-item:hover { background-color: #f3f4f6; }
        
        /* Vercel Toolbar Hide */
        #vercel-live-feedback, [id^="vercel-"], [class^="vercel-"] {
            display: none !important;
            visibility: hidden !important;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="loginPage" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-700">লগইন করুন</h2>
            <input type="text" id="username" placeholder="ইউজারনেম" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full p-2 mb-4 border rounded">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">প্রবেশ করুন</button>
            <p id="loginMsg" class="text-red-500 mt-2 text-center"></p>
        </div>
    </div>

    <div id="mainPage" class="hidden container mx-auto p-4">
        <nav class="flex justify-between items-center bg-blue-800 text-white p-4 rounded-lg mb-6 shadow-lg">
            <h1 class="text-xl font-bold">ভূমি লিজ ড্যাশবোর্ড</h1>
            <div class="flex gap-4 items-center">
                <span id="userDisplay" class="font-semibold text-yellow-300"></span>
                <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-sm hover:bg-red-600">লগআউট</button>
            </div>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                <h3 class="text-lg font-bold mb-4 text-blue-800 border-b pb-2">নতুন তথ্য এন্ট্রি</h3>
                <div class="space-y-4">
                    <div class="relative">
                        <label class="block text-sm font-medium text-gray-700">নাম (টাইপ করুন)</label>
                        <input type="text" id="entryNameSearch" placeholder="নাম খুঁজুন বা লিখুন..." 
                               class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                        <div id="entryNameDD" class="dropdown-list hidden"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium">জমির পরিমাণ (শতক)</label>
                            <input type="number" id="entryLand" class="w-full p-2 border rounded bg-gray-50" readonly>
                        </div>
                        <div>
                            <label class="block text-sm font-medium">হার (টাকা)</label>
                            <input type="number" id="entryRate" class="w-full p-2 border rounded bg-gray-50" readonly>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-blue-700 font-bold">হারি বছর</label>
                            <input type="text" id="hariYear" class="w-full p-2 border rounded border-blue-300" placeholder="যেমন: ২০২৪">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-green-700 font-bold">টাকা প্রদান</label>
                            <input type="number" id="tkGiven" class="w-full p-2 border rounded border-green-300" placeholder="টাকার পরিমাণ">
                        </div>
                    </div>
                    
                    <button onclick="saveData()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">সেভ করুন</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-gray-500">
                <h3 class="text-lg font-bold mb-4 text-gray-800 border-b pb-2">সেটিংস (প্রোফাইল যোগ)</h3>
                <div class="space-y-3">
                    <input type="text" id="profName" placeholder="নতুন নাম" class="w-full p-2 border rounded">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="profLand" placeholder="জমি (শতক)" class="p-2 border rounded">
                        <input type="number" id="profRate" placeholder="হার (টাকা)" class="p-2 border rounded">
                    </div>
                    <button onclick="saveProfile()" class="w-full bg-gray-700 text-white p-2 rounded hover:bg-black transition">প্রোফাইল সেভ করুন</button>
                </div>
                <div id="profileList" class="mt-4 max-height-48 overflow-y-auto border-t pt-2"></div>
            </div>
        </div>
    </div>

    <script>
        let loggedInUser = null;
        let profiles = [];
        let allNames = [];

        // API Helper
        async function api(url, data = {}) {
            const r = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return r.json();
        }

        async function login() {
            const res = await api('/api/login', { 
                username: document.getElementById('username').value, 
                password: document.getElementById('password').value 
            });
            if (res.success) {
                loggedInUser = res.user.username;
                document.getElementById('userDisplay').innerText = `ইউজার: ${loggedInUser}`;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                loadInitData();
            } else {
                document.getElementById('loginMsg').innerText = res.message;
            }
        }

        function logout() { location.reload(); }

        async function loadInitData() {
            const res = await api('/api/getInitData');
            profiles = res.profiles || [];
            allNames = res.searchOptions.names || [];
            renderProfiles();
        }

        // --- Searchable Dropdown Logic ---
        const entrySearchInput = document.getElementById('entryNameSearch');
        const entryDD = document.getElementById('entryNameDD');

        entrySearchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            entryDD.innerHTML = '';
            
            // ফিল্টার করা নাম বের করা
            const filtered = profiles.filter(p => p.name.toLowerCase().includes(val));
            
            if (filtered.length > 0 && val !== '') {
                entryDD.classList.remove('hidden');
                filtered.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.innerHTML = `<strong>${p.name}</strong> - ${p.land} শতক`;
                    div.onclick = () => {
                        entrySearchInput.value = p.name;
                        document.getElementById('entryLand').value = p.land;
                        document.getElementById('entryRate').value = p.rate;
                        entryDD.classList.add('hidden');
                    };
                    entryDD.appendChild(div);
                });
            } else {
                entryDD.classList.add('hidden');
            }
        });

        // বাইরে ক্লিক করলে ড্রপডাউন বন্ধ
        document.addEventListener('click', (e) => {
            if (e.target !== entrySearchInput) entryDD.classList.add('hidden');
        });

        async function saveData() {
            const fd = {
                name: entrySearchInput.value,
                land: document.getElementById('entryLand').value,
                rate: document.getElementById('entryRate').value,
                hariYear: document.getElementById('hariYear').value,
                tkGiven: document.getElementById('tkGiven').value,
                loggedInUser
            };
            if(!fd.name || !fd.hariYear) return alert("নাম এবং বছর অবশ্যই দিন!");
            const res = await api('/api/saveFormData', fd);
            if(res.success) {
                alert("সফলভাবে সেভ হয়েছে!");
                location.reload();
            }
        }

        async function saveProfile() {
            const d = {
                name: document.getElementById('profName').value,
                land: document.getElementById('profLand').value,
                rate: document.getElementById('profRate').value
            };
            await api('/api/saveProfile', d);
            loadInitData();
        }

        function renderProfiles() {
            const list = document.getElementById('profileList');
            list.innerHTML = '<h4 class="font-bold text-sm mb-2 text-gray-600">বর্তমান প্রোফাইলসমূহ:</h4>';
            profiles.forEach(p => {
                list.innerHTML += `
                    <div class="flex justify-between text-sm bg-gray-50 p-2 mb-1 rounded border">
                        <span>${p.name} (${p.land} শতক)</span>
                        <button onclick="deleteProfile('${p.name}', ${p.land})" class="text-red-500">মুছুন</button>
                    </div>`;
            });
        }

        async function deleteProfile(name, land) {
            if(confirm("প্রোফাইলটি মুছে ফেলবেন?")) {
                await api('/api/deleteProfile', { name, land });
                loadInitData();
            }
        }
    </script>
</body>
</html>
