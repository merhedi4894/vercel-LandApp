<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভূমি লিজ ব্যবস্থাপনা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        #listContainer {
            position: absolute;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ddd;
            z-index: 9999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .item:hover { background: #f0f7ff; color: #1d4ed8; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="loginPage" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded shadow w-80">
            <h2 class="text-xl font-bold mb-4 text-center text-blue-600">লগইন করুন</h2>
            <input type="text" id="user" placeholder="Username" class="w-full p-2 mb-2 border rounded">
            <input type="password" id="pass" placeholder="Password" class="w-full p-2 mb-4 border rounded">
            <button onclick="doLogin()" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
        </div>
    </div>

    <div id="mainPage" class="hidden p-4 container mx-auto">
        <div class="bg-white p-6 rounded shadow relative max-w-lg mx-auto">
            <h3 class="font-bold mb-4 border-b pb-2">নতুন এন্ট্রি (সার্চ করুন)</h3>
            
            <div class="relative mb-4">
                <label class="block text-sm font-bold text-gray-600">নাম টাইপ করুন:</label>
                <input type="text" id="nameInput" oninput="showResults(this.value)" placeholder="এখানে নাম লিখুন..." autocomplete="off" class="w-full p-3 border-2 border-blue-200 rounded-lg outline-none focus:border-blue-500">
                <div id="listContainer" class="hidden"></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="text" id="landOut" placeholder="জমি" readonly class="p-3 border bg-gray-50 rounded">
                <input type="text" id="rateOut" placeholder="হার" readonly class="p-3 border bg-gray-50 rounded">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="text" id="yearIn" placeholder="হারি বছর" class="p-3 border rounded">
                <input type="number" id="tkIn" placeholder="টাকা প্রদান" class="p-3 border rounded">
            </div>

            <button onclick="saveData()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">সেভ করুন</button>
            <button onclick="location.reload()" class="w-full mt-4 text-red-500 text-sm">লগআউট</button>
        </div>
    </div>

    <script>
        let profileData = [];
        let adminUser = "";

        // API Call
        async function callServer(url, body) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            return res.json();
        }

        async function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await callServer('/api/login', { username: u, password: p });
            
            if(res.success) {
                adminUser = u;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                
                // ডাটা লোড করা
                const init = await callServer('/api/getInitData', {});
                // ব্যাকএন্ডের সব সম্ভাব্য জায়গা থেকে ডাটা খোঁজা
                profileData = init.profiles || (init.searchOptions ? init.searchOptions.profiles : []) || [];
                console.log("ডাটা লোড হয়েছে:", profileData);
            } else {
                alert("Login Failed!");
            }
        }

        // --- সরাসরি ফিল্টারিং ফাংশন ---
        function showResults(val) {
            const term = val.toLowerCase().trim();
            const container = document.getElementById('listContainer');
            container.innerHTML = '';

            if (term === '') {
                container.classList.add('hidden');
                return;
            }

            // ফিল্টার করা
            const matches = profileData.filter(p => p.name.toLowerCase().includes(term));

            if (matches.length > 0) {
                container.classList.remove('hidden');
                matches.forEach(p => {
                    const d = document.createElement('div');
                    d.className = 'item';
                    d.innerHTML = `<strong>${p.name}</strong> <span class="text-gray-500">(${p.land} শতক)</span>`;
                    d.onclick = function() {
                        document.getElementById('nameInput').value = p.name;
                        document.getElementById('landOut').value = p.land;
                        document.getElementById('rateOut').value = p.rate;
                        container.classList.add('hidden');
                    };
                    container.appendChild(d);
                });
            } else {
                container.classList.add('hidden');
            }
        }

        // বাইরে ক্লিক করলে বন্ধ হবে
        document.onclick = (e) => {
            if(e.target.id !== 'nameInput') document.getElementById('listContainer').classList.add('hidden');
        };

        async function saveData() {
            const obj = {
                name: document.getElementById('nameInput').value,
                land: document.getElementById('landOut').value,
                rate: document.getElementById('rateOut').value,
                hariYear: document.getElementById('yearIn').value,
                tkGiven: document.getElementById('tkIn').value,
                loggedInUser: adminUser
            };
            if(!obj.name || !obj.hariYear) return alert("তথ্য অসম্পূর্ণ!");
            const res = await callServer('/api/saveFormData', obj);
            if(res.success) { alert("সেভ হয়েছে!"); location.reload(); }
        }
    </script>
</body>
</html>
