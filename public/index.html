<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভূমি লিজ ব্যবস্থাপনা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        #suggestionBox {
            position: absolute;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ddd;
            z-index: 999;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 0.5rem;
            margin-top: 2px;
        }
        .suggest-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; transition: background 0.2s; }
        .suggest-item:hover { background: #f0f7ff; color: #1d4ed8; }
        
        /* Vercel Toolbar Hide */
        #vercel-live-feedback, [id^="vercel-"], [class^="vercel-"], [data-vercel-toolbar] {
            display: none !important;
            visibility: hidden !important;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="loginArea" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-700">অ্যাডমিন লগইন</h2>
            <input type="text" id="user" placeholder="ইউজারনেম" class="w-full p-3 mb-4 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            <input type="password" id="pass" placeholder="পাসওয়ার্ড" class="w-full p-3 mb-6 border rounded-lg outline-none focus:ring-2 focus:ring-blue-400">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">প্রবেশ করুন</button>
            <p id="loginMsg" class="text-red-500 mt-3 text-center text-sm"></p>
        </div>
    </div>

    <div id="mainArea" class="hidden p-4 md:p-8 container mx-auto">
        <nav class="flex justify-between items-center bg-blue-800 text-white p-4 rounded-xl mb-8 shadow-md">
            <h1 class="text-lg font-bold tracking-wide">লিজ ম্যানেজমেন্ট সিস্টেম</h1>
            <div class="flex items-center gap-4">
                <span id="displayUser" class="text-blue-200 font-medium"></span>
                <button onclick="location.reload()" class="bg-red-500 px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-red-600">লগআউট</button>
            </div>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500 relative">
                <h3 class="text-lg font-bold mb-5 text-gray-800">নতুন তথ্য এন্ট্রি</h3>
                
                <div class="space-y-4">
                    <div class="relative" id="searchContainer">
                        <label class="block text-sm font-bold text-gray-600 mb-1">নাম খুঁজুন (টাইপ করুন)</label>
                        <input type="text" id="searchName" oninput="doSearch(this.value)" autocomplete="off" 
                               placeholder="নাম লিখতে শুরু করুন..." class="w-full p-3 border-2 border-blue-100 rounded-lg focus:border-blue-500 outline-none">
                        <div id="suggestionBox" class="hidden"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-gray-400">জমির পরিমাণ</label>
                            <input type="text" id="resLand" readonly class="w-full p-3 bg-gray-50 border rounded-lg font-bold">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400">হার (টাকা)</label>
                            <input type="text" id="resRate" readonly class="w-full p-3 bg-gray-50 border rounded-lg font-bold">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <input type="text" id="inYear" placeholder="হারি বছর" class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                        <input type="number" id="inTk" placeholder="টাকা প্রদান" class="p-3 border rounded-lg focus:ring-2 focus:ring-green-400 outline-none">
                    </div>

                    <button onclick="submitData()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-700 transition">সেভ করুন</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-gray-500">
                <h3 class="text-lg font-bold mb-5 text-gray-800">প্রোফাইল সেটিংস</h3>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="নতুন ব্যক্তির নাম" class="w-full p-3 border rounded-lg">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="pLand" placeholder="জমি (শতক)" class="p-3 border rounded-lg">
                        <input type="number" id="pRate" placeholder="হার (টাকা)" class="p-3 border rounded-lg">
                    </div>
                    <button onclick="saveProfile()" class="w-full bg-gray-700 text-white p-3 rounded-lg font-bold hover:bg-black transition">প্রোফাইল যোগ করুন</button>
                </div>
                <div id="pList" class="mt-6 space-y-2 max-h-60 overflow-y-auto border-t pt-4"></div>
            </div>
        </div>
    </div>

    <script>
        let profiles = [];
        let loggedUser = "";

        async function api(url, data = {}) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return res.json();
        }

        async function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await api('/api/login', { username: u, password: p });
            if(res.success) {
                loggedUser = u;
                document.getElementById('displayUser').innerText = "অ্যাডমিন: " + u;
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('mainArea').classList.remove('hidden');
                fetchInitData();
            } else {
                document.getElementById('loginMsg').innerText = "ভুল ইউজারনেম বা পাসওয়ার্ড!";
            }
        }

        async function fetchInitData() {
            const res = await api('/api/getInitData', {});
            // ব্যাকএন্ড থেকে আসা প্রোফাইল অ্যারে
            profiles = res.profiles || [];
            renderProfileList();
        }

        function doSearch(val) {
            const query = val.toLowerCase().trim();
            const box = document.getElementById('suggestionBox');
            box.innerHTML = '';

            if(!query) {
                box.classList.add('hidden');
                return;
            }

            const filtered = profiles.filter(p => p.name.toLowerCase().includes(query));

            if(filtered.length > 0) {
                box.classList.remove('hidden');
                filtered.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'suggest-item font-medium';
                    div.innerHTML = `<span>${p.name}</span> <span class="text-xs text-gray-400 float-right mt-1">${p.land} শতক</span>`;
                    div.onclick = () => {
                        document.getElementById('searchName').value = p.name;
                        document.getElementById('resLand').value = p.land;
                        document.getElementById('resRate').value = p.rate;
                        box.classList.add('hidden');
                    };
                    box.appendChild(div);
                });
            } else {
                box.classList.add('hidden');
            }
        }

        document.addEventListener('click', (e) => {
            if(!document.getElementById('searchContainer').contains(e.target)) {
                document.getElementById('suggestionBox').classList.add('hidden');
            }
        });

        async function submitData() {
            const d = {
                name: document.getElementById('searchName').value,
                land: document.getElementById('resLand').value,
                rate: document.getElementById('resRate').value,
                hariYear: document.getElementById('inYear').value,
                tkGiven: document.getElementById('inTk').value,
                loggedInUser: loggedUser
            };
            if(!d.name || !d.hariYear) return alert("নাম এবং বছর দিন!");
            const res = await api('/api/saveFormData', d);
            if(res.success) {
                alert("সফলভাবে সেভ হয়েছে!");
                location.reload();
            }
        }

        async function saveProfile() {
            const d = {
                name: document.getElementById('pName').value,
                land: document.getElementById('pLand').value,
                rate: document.getElementById('pRate').value
            };
            if(!d.name || !d.land) return alert("তথ্য দিন!");
            await api('/api/saveProfile', d);
            document.getElementById('pName').value = '';
            document.getElementById('pLand').value = '';
            document.getElementById('pRate').value = '';
            fetchInitData();
        }

        function renderProfileList() {
            const list = document.getElementById('pList');
            list.innerHTML = '<p class="text-xs font-bold text-gray-400 mb-2 uppercase">সংরক্ষিত প্রোফাইল:</p>';
            profiles.forEach(p => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded border text-sm">
                        <span>${p.name} (${p.land} শতক)</span>
                        <button onclick="delProfile('${p.name}', ${p.land})" class="text-red-500 font-bold">✕</button>
                    </div>`;
            });
        }

        async function delProfile(name, land) {
            if(confirm("মুছে ফেলবেন?")) {
                await api('/api/deleteProfile', { name, land });
                fetchInitData();
            }
        }
    </script>
</body>
</html>
