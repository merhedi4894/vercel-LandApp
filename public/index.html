<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভূমি লিজ ব্যবস্থাপনা</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script> tailwind.config = { theme: { extend: { colors: { primary: '#1e3a5f', accent: '#0ea5e9' } } } } </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%); min-height: 100vh; }
        .input-field { transition: all 0.2s; border: 2px solid #e2e8f0; }
        .input-field:focus { border-color: #0ea5e9; outline: none; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        .btn { transition: all 0.2s; color: white; }
        .btn:hover { transform: translateY(-1px); }
        .dropdown-list { position: absolute; z-index: 50; width: 100%; max-height: 250px; overflow-y: auto; background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-top: 5px; }
        .dropdown-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .dropdown-item:hover { background-color: #f0f9ff; color: #0284c7; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginSection" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-2xl border border-white/50 backdrop-blur-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-primary mb-2">স্বাগতম</h1>
            <p class="text-gray-500">অ্যাডমিন প্যানেলে লগইন করুন</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="ইউজারনেম" class="input-field w-full p-4 rounded-xl bg-gray-50">
            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="input-field w-full p-4 rounded-xl bg-gray-50">
            <button onclick="login()" class="w-full py-4 rounded-xl bg-primary hover:bg-slate-800 font-bold text-lg shadow-lg btn transition-all">লগইন করুন</button>
        </div>
    </div>

    <div id="appSection" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-2xl font-extrabold text-primary flex items-center gap-2">
                <span class="p-2 bg-primary text-white rounded-lg">LMS</span> ভূমি লিজ ড্যাশবোর্ড
            </h1>
            <div class="flex items-center gap-3 bg-white p-2 rounded-2xl shadow-sm border">
                <span id="userDisplay" class="font-semibold px-4 text-gray-700"></span>
                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-xl text-sm font-bold text-white transition-all shadow-md">লগআউট</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <span class="w-2 h-6 bg-accent rounded-full"></span> নতুন তথ্য এন্ট্রি
                </h3>
                <div class="space-y-5">
                    <div class="relative">
                        <label class="block text-sm font-bold text-gray-600 mb-2">নাম (টাইপ করুন)</label>
                        <input type="text" id="entryName" autocomplete="off" placeholder="নাম লিখতে শুরু করুন..." class="input-field w-full p-4 rounded-2xl bg-gray-50 font-medium">
                        <div id="nameDD" class="dropdown-list hidden"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase ml-2 mb-1">জমির পরিমাণ</label>
                            <input type="number" id="entryLand" readonly class="input-field w-full p-4 rounded-2xl bg-gray-100 font-bold text-primary">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase ml-2 mb-1">লিজ হার</label>
                            <input type="number" id="entryRate" readonly class="input-field w-full p-4 rounded-2xl bg-gray-100 font-bold text-primary">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="hariYear" placeholder="হারি বছর" class="input-field w-full p-4 rounded-2xl bg-blue-50/50">
                        <input type="number" id="tkGiven" placeholder="টাকা প্রদান" class="input-field w-full p-4 rounded-2xl bg-green-50/50">
                    </div>
                    <button onclick="saveData()" class="w-full bg-primary py-4 rounded-2xl font-bold text-lg shadow-xl btn hover:bg-slate-800">ডাটা সেভ করুন</button>
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-6">প্রোফাইল সেটিংস</h3>
                <div class="space-y-4">
                    <input type="text" id="profName" placeholder="নতুন নাম" class="input-field w-full p-4 rounded-2xl">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="profLand" placeholder="জমি (শতক)" class="input-field w-full p-4 rounded-2xl">
                        <input type="number" id="profRate" placeholder="লিজ হার" class="input-field w-full p-4 rounded-2xl">
                    </div>
                    <button onclick="saveProfile()" class="w-full bg-slate-700 py-4 rounded-2xl font-bold text-white hover:bg-black shadow-lg transition-all">প্রোফাইল যোগ করুন</button>
                </div>
                <div id="profileList" class="mt-6 space-y-2 max-h-52 overflow-y-auto border-t pt-4"></div>
            </div>

            <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                <h3 class="text-xl font-bold text-gray-800 mb-6">তথ্য খুঁজুন</h3>
                <div class="relative max-w-md">
                    <input type="text" id="searchName" autocomplete="off" placeholder="নাম দিয়ে খুঁজুন..." class="input-field w-full p-4 rounded-2xl bg-gray-50">
                    <div id="searchDD" class="dropdown-list hidden"></div>
                </div>
                <div id="searchResults" class="mt-8 overflow-x-auto"></div>
            </div>
        </div>
    </div>

    <script>
        let user = null;
        let profiles = [];

        // API Helper
        const api = async (url, data = {}) => {
            const r = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return r.json();
        };

        const login = async () => {
            const res = await api('/api/login', { username: username.value, password: password.value });
            if(res.success) {
                user = res.user;
                localStorage.setItem('s', JSON.stringify({u: user.username}));
                location.reload();
            } else alert("ভুল পাসওয়ার্ড!");
        };

        const logout = () => { localStorage.removeItem('s'); location.reload(); };

        const init = async () => {
            const res = await api('/api/getInitData');
            profiles = res.profiles || [];
            renderProfiles();
            activateSmartSearch(); // স্মার্ট সার্চ চালু করা
        };

        // --- স্মার্ট সার্চ লজিক (আপনার চাহিদা অনুযায়ী আপডেট করা) ---
        const activateSmartSearch = () => {
            const setupFilter = (inputId, dropdownId, callback) => {
                const input = document.getElementById(inputId);
                const dd = document.getElementById(dropdownId);

                input.addEventListener('input', function() {
                    const val = this.value.toLowerCase().trim();
                    dd.innerHTML = '';
                    if(!val) { dd.classList.add('hidden'); return; }

                    const matches = profiles.filter(p => p.name.toLowerCase().includes(val));
                    if(matches.length > 0) {
                        dd.classList.remove('hidden');
                        matches.forEach(p => {
                            const div = document.createElement('div');
                            div.className = 'dropdown-item flex justify-between';
                            div.innerHTML = `<span>${p.name}</span> <span class="text-gray-400 text-xs">${p.land} শতক</span>`;
                            div.onclick = () => {
                                input.value = p.name;
                                callback(p);
                                dd.classList.add('hidden');
                            };
                            dd.appendChild(div);
                        });
                    } else dd.classList.add('hidden');
                });
            };

            // New Entry ফিল্টারিং
            setupFilter('entryName', 'nameDD', (p) => {
                document.getElementById('entryLand').value = p.land;
                document.getElementById('entryRate').value = p.rate;
            });

            // Search ফিল্টারিং
            setupFilter('searchName', 'searchDD', (p) => {
                // এখানে আপনি চাইলে নাম সিলেক্ট করার পর অটো সার্চ রেজাল্ট দেখাতে পারেন
                console.log("Searching for:", p.name);
            });
        };

        // বাইরে ক্লিক করলে ড্রপডাউন বন্ধ করা
        document.addEventListener('click', e => {
            if(!e.target.closest('#entryName') && !e.target.closest('#nameDD')) document.getElementById('nameDD').classList.add('hidden');
            if(!e.target.closest('#searchName') && !e.target.closest('#searchDD')) document.getElementById('searchDD').classList.add('hidden');
        });

        const saveData = async () => {
            const d = {
                name: entryName.value,
                land: entryLand.value,
                rate: entryRate.value,
                hariYear: hariYear.value,
                tkGiven: tkGiven.value,
                loggedInUser: user.username
            };
            if(!d.name || !d.hariYear) return alert("নাম এবং বছর দিন");
            const res = await api('/api/saveFormData', d);
            if(res.success) { alert("সেভ হয়েছে!"); location.reload(); }
        };

        const saveProfile = async () => {
            const d = { name: profName.value, land: profLand.value, rate: profRate.value };
            if(!d.name) return alert("নাম দিন");
            await api('/api/saveProfile', d);
            init();
            profName.value = ''; profLand.value = ''; profRate.value = '';
        };

        const renderProfiles = () => {
            profileList.innerHTML = profiles.map(p => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100 group">
                    <div>
                        <p class="font-bold text-gray-800">${p.name}</p>
                        <p class="text-xs text-gray-400">${p.land} শতক | হার: ${p.rate}</p>
                    </div>
                    <button onclick="delP('${p.name}', ${p.land})" class="text-red-400 hover:text-red-600 font-bold p-2">✕</button>
                </div>
            `).join('');
        };

        const delP = async (n, l) => {
            if(confirm("মুছবেন?")) {
                await api('/api/deleteProfile', { name: n, land: l });
                init();
            }
        };

        // Session & Start
        if (localStorage.getItem('s')) {
            const s = JSON.parse(localStorage.getItem('s'));
            user = { username: s.u };
            document.getElementById('userDisplay').innerText = "অ্যাডমিন: " + user.username;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            init();
        }
    </script>
</body>
</html>
