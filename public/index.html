<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভূমি লিজ ব্যবস্থাপনা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .dropdown-list {
            position: absolute;
            z-index: 100;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-top: 2px;
        }
        .dropdown-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
        }
        .dropdown-item:hover { background-color: #eff6ff; color: #1d4ed8; }
        
        /* Vercel Toolbar Hide */
        #vercel-live-feedback, [id^="vercel-"], [data-vercel-toolbar] {
            display: none !important;
            visibility: hidden !important;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div id="loginPage" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-xl w-96 border border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-800">অ্যাডমিন লগইন</h2>
            <input type="text" id="username" placeholder="ইউজারনেম" class="w-full p-3 mb-4 border rounded-lg outline-none focus:border-blue-500">
            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full p-3 mb-4 border rounded-lg outline-none focus:border-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">প্রবেশ করুন</button>
            <p id="loginMsg" class="text-red-500 mt-3 text-center text-sm font-medium"></p>
        </div>
    </div>

    <div id="mainPage" class="hidden container mx-auto p-4 max-w-5xl">
        <nav class="flex justify-between items-center bg-blue-900 text-white p-4 rounded-xl mb-8 shadow-md">
            <h1 class="text-lg font-bold tracking-wide">ভূমি লিজ ম্যানেজমেন্ট</h1>
            <div class="flex items-center gap-4">
                <span id="userDisplay" class="text-blue-200 text-sm"></span>
                <button onclick="location.reload()" class="bg-red-500 px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-red-600">লগআউট</button>
            </div>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 relative">
                <h3 class="text-lg font-bold mb-5 text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-600 rounded-full"></span> নতুন তথ্য এন্ট্রি
                </h3>
                
                <div class="space-y-5">
                    <div class="relative" id="searchContainer">
                        <label class="block text-sm font-semibold text-gray-600 mb-1">নাম খুঁজুন (টাইপ করুন)</label>
                        <input type="text" id="entrySearch" autocomplete="off" 
                               placeholder="নাম লিখতে শুরু করুন..." 
                               class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                        <div id="dropdownList" class="dropdown-list hidden"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">জমির পরিমাণ</label>
                            <input type="text" id="dispLand" readonly class="w-full p-3 bg-gray-50 border rounded-lg text-gray-700 font-bold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">হার (টাকা)</label>
                            <input type="text" id="dispRate" readonly class="w-full p-3 bg-gray-50 border rounded-lg text-gray-700 font-bold">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <div class="bg-blue-50 p-3 rounded-lg">
                            <label class="block text-xs font-bold text-blue-700 uppercase mb-1">হারি বছর</label>
                            <input type="text" id="hariYear" placeholder="২০২৬" class="w-full p-2 border border-blue-200 rounded outline-none focus:border-blue-500">
                        </div>
                        <div class="bg-green-50 p-3 rounded-lg">
                            <label class="block text-xs font-bold text-green-700 uppercase mb-1">টাকা প্রদান</label>
                            <input type="number" id="tkGiven" placeholder="0.00" class="w-full p-2 border border-green-200 rounded outline-none focus:border-green-500">
                        </div>
                    </div>

                    <button onclick="saveData()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transform active:scale-95 transition">ডাটা সেভ করুন</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-lg font-bold mb-5 text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-6 bg-gray-400 rounded-full"></span> প্রোফাইল সেটিংস
                </h3>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="ব্যক্তির নাম" class="w-full p-3 border rounded-lg">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="pLand" placeholder="জমি (শতক)" class="p-3 border rounded-lg">
                        <input type="number" id="pRate" placeholder="হার (টাকা)" class="p-3 border rounded-lg">
                    </div>
                    <button onclick="saveProfile()" class="w-full bg-gray-800 text-white p-3 rounded-lg font-bold hover:bg-black transition">প্রোফাইল যোগ করুন</button>
                </div>
                
                <div class="mt-6 border-t pt-4">
                    <p class="text-sm font-bold text-gray-500 mb-3">সংরক্ষিত প্রোফাইল:</p>
                    <div id="pList" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let profiles = [];
        let currentUser = "";

        async function api(url, data = {}) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await res.json();
            } catch (e) { return { success: false, message: "সার্ভার এরর!" }; }
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await api('/api/login', { username: u, password: p });
            if(res.success) {
                currentUser = res.user.username;
                document.getElementById('userDisplay').innerText = `ইউজার: ${currentUser}`;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainPage').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('loginMsg').innerText = res.message;
            }
        }

        async function loadData() {
            const res = await api('/api/getInitData');
            profiles = res.profiles || [];
            renderProfileList();
        }

        // --- স্মার্ট ফিল্টারিং ড্রপডাউন কোড ---
        const searchInput = document.getElementById('entrySearch');
        const dropdown = document.getElementById('dropdownList');

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.trim().toLowerCase();
            dropdown.innerHTML = '';
            
            if(!val) {
                dropdown.classList.add('hidden');
                return;
            }

            // নাম ফিল্টার করা হচ্ছে
            const matches = profiles.filter(p => p.name.toLowerCase().includes(val));

            if(matches.length > 0) {
                dropdown.classList.remove('hidden');
                matches.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'dropdown-item font-medium';
                    item.innerHTML = `<span class="text-blue-600">${p.name}</span> <span class="text-gray-400 text-xs ml-2">(${p.land} শতক)</span>`;
                    item.onclick = () => {
                        searchInput.value = p.name;
                        document.getElementById('dispLand').value = p.land;
                        document.getElementById('dispRate').value = p.rate;
                        dropdown.classList.add('hidden');
                    };
                    dropdown.appendChild(item);
                });
            } else {
                dropdown.classList.add('hidden');
            }
        });

        // ড্রপডাউনের বাইরে ক্লিক করলে সেটি বন্ধ হয়ে যাবে
        document.addEventListener('click', (e) => {
            if(!document.getElementById('searchContainer').contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });

        async function saveData() {
            const data = {
                name: searchInput.value,
                land: document.getElementById('dispLand').value,
                rate: document.getElementById('dispRate').value,
                hariYear: document.getElementById('hariYear').value,
                tkGiven: document.getElementById('tkGiven').value,
                loggedInUser: currentUser
            };
            if(!data.name || !data.hariYear) return alert("দয়া করে নাম ও বছর লিখুন!");
            const res = await api('/api/saveFormData', data);
            if(res.success) {
                alert("ডাটা সেভ হয়েছে!");
                document.getElementById('tkGiven').value = '';
                searchInput.value = '';
                document.getElementById('dispLand').value = '';
                document.getElementById('dispRate').value = '';
            }
        }

        async function saveProfile() {
            const p = {
                name: document.getElementById('pName').value,
                land: document.getElementById('pLand').value,
                rate: document.getElementById('pRate').value
            };
            if(!p.name || !p.land) return alert("তথ্য পূরণ করুন!");
            await api('/api/saveProfile', p);
            document.getElementById('pName').value = '';
            document.getElementById('pLand').value = '';
            document.getElementById('pRate').value = '';
            loadData();
        }

        function renderProfileList() {
            const container = document.getElementById('pList');
            container.innerHTML = '';
            profiles.forEach(p => {
                container.innerHTML += `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100 shadow-sm">
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${p.name}</p>
                        <p class="text-xs text-gray-500">${p.land} শতক | হার: ${p.rate}৳</p>
                    </div>
                    <button onclick="delProfile('${p.name}', ${p.land})" class="text-red-400 hover:text-red-600 text-xs font-bold">মুছুন</button>
                </div>`;
            });
        }

        async function delProfile(name, land) {
            if(confirm("প্রোফাইলটি ডিলিট করবেন?")) {
                await api('/api/deleteProfile', { name, land });
                loadData();
            }
        }
    </script>
</body>
</html>
